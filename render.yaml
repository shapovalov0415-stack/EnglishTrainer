services:
  - type: web
    name: englishtrainer-api
    runtime: node
    plan: free
    region: singapore
    rootDir: server
    # yt-dlp の取得は npm postinstall (scripts/get-yt-dlp.mjs) が行う
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: OPENAI_REALTIME_MODEL
        value: gpt-4o-mini-realtime-preview
