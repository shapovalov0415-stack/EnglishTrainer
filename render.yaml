services:
  - type: web
    name: englishtrainer-api
    runtime: node
    plan: free
    region: singapore
    rootDir: server
    # yt-dlp: Instagram/YouTube 等のページ URL から動画を解決するために取得
    buildCommand: npm install && curl -fsSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux -o yt-dlp && chmod +x yt-dlp
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
